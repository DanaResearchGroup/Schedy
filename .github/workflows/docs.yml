name: docs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Publishes the built MkDocs site to the `gh-pages` branch via `mkdocs gh-deploy`
# (pure Python — no Node action). One-time: Settings -> Pages -> Source:
# "Deploy from a branch" -> gh-pages / (root).
permissions:
  contents: write

jobs:
  docs:
    name: Build & publish MkDocs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gh-deploy needs history to update the gh-pages branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install "mkdocs-material>=9.5"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build (PR) or deploy to gh-pages (push)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            mkdocs build --strict
          else
            mkdocs gh-deploy --force --strict
          fi
