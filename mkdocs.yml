site_name: Schedy
site_description: Department course-scheduling auto-solver
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Modules: modules.md
  - Constraints reference: constraints.md
  - PRD: PRD.md
